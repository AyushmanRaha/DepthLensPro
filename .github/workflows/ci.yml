name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Black check
        run: black --check .

      - name: Ruff check
        run: ruff check .

      - name: Mypy
        run: mypy backend/

      - name: Pytest
        run: pytest

      - name: Electron lightweight tests
        run: |
          cd electron-app
          npm test
