name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.head.repo.full_name || github.repository }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

env:
  CI: "1"
  TESTING: "1"
  DEPTHLENS_DISABLE_MODEL_DOWNLOADS: "1"
  DEPTHLENS_SKIP_WARMUP: "1"
  DEPTHLENS_CACHE_BACKEND: "memory"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

defaults:
  run:
    shell: bash

jobs:
  backend-quality:
    name: backend-quality
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            pyproject.toml
            mypy.ini

      - name: Install backend dependencies
        run: |
          python -m pip install --disable-pip-version-check --requirement backend/requirements.txt
          python -m pip check

      - name: Run backend quality gates
        run: scripts/ci.sh backend-quality

  electron-contract:
    name: electron-contract
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: electron-app/package-lock.json

      - name: Install Electron dependencies from lockfile
        working-directory: electron-app
        run: npm ci

      - name: Run Electron contract gates
        run: scripts/ci.sh electron-contract

  docker-build:
    name: docker-build
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          pull: true
          push: false
          tags: depthlenspro-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  ci-passed:
    name: ci-passed
    runs-on: ubuntu-latest
    needs:
      - backend-quality
      - electron-contract
      - docker-build
    if: always()

    steps:
      - name: Verify all required CI jobs passed
        run: |
          echo "backend-quality: ${{ needs.backend-quality.result }}"
          echo "electron-contract: ${{ needs.electron-contract.result }}"
          echo "docker-build: ${{ needs.docker-build.result }}"

          failed=0
          for job_result in \
            "backend-quality:${{ needs.backend-quality.result }}" \
            "electron-contract:${{ needs.electron-contract.result }}" \
            "docker-build:${{ needs.docker-build.result }}"; do
            job="${job_result%%:*}"
            result="${job_result#*:}"
            if [ "$result" != "success" ]; then
              echo "::error title=${job} did not pass::Expected success, got ${result}. Open the ${job} logs for the failing step."
              failed=1
            fi
          done

          if [ "$failed" -ne 0 ]; then
            exit 1
          fi

          echo "All required CI jobs passed."
