name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.head.repo.full_name || github.repository }}-${{ github.head_ref || github.ref_name || github.run_id }}
  cancel-in-progress: true

env:
  CI: "1"
  TESTING: "1"
  DEPTHLENS_DISABLE_MODEL_DOWNLOADS: "1"
  DEPTHLENS_SKIP_WARMUP: "1"
  DEPTHLENS_CACHE_BACKEND: "memory"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

defaults:
  run:
    shell: bash

jobs:
  backend-quality:
    name: backend-quality
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        timeout-minutes: 5

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        timeout-minutes: 5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            pyproject.toml
            mypy.ini

      - name: Install backend dependencies
        timeout-minutes: 15
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r backend/requirements.txt
          python -m pip check

      - name: Run backend quality checks
        timeout-minutes: 15
        run: scripts/ci.sh backend-quality

  electron-contract:
    name: electron-contract
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        timeout-minutes: 5

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        timeout-minutes: 5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: electron-app/package-lock.json

      - name: Install Electron dependencies
        timeout-minutes: 10
        working-directory: electron-app
        run: npm ci

      - name: Run Electron contract checks
        timeout-minutes: 10
        run: scripts/ci.sh electron-contract

  docker-build:
    name: docker-build
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        timeout-minutes: 5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        timeout-minutes: 5

      - name: Build backend Docker image
        uses: docker/build-push-action@v6
        timeout-minutes: 30
        with:
          context: .
          pull: true
          push: false
          load: false
          tags: depthlenspro-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  ci-passed:
    name: ci-passed
    runs-on: ubuntu-latest
    needs:
      - backend-quality
      - electron-contract
      - docker-build
    if: always()
    timeout-minutes: 5

    steps:
      - name: Verify all required CI jobs passed
        timeout-minutes: 5
        run: |
          set -Eeuo pipefail

          declare -A results=(
            [backend-quality]="${{ needs.backend-quality.result }}"
            [electron-contract]="${{ needs.electron-contract.result }}"
            [docker-build]="${{ needs.docker-build.result }}"
          )

          failed=0
          for job in backend-quality electron-contract docker-build; do
            result="${results[$job]:-missing}"
            echo "$job: $result"
            if [[ "$result" != "success" ]]; then
              echo "::error title=Required CI job did not pass::$job result was '$result'"
              failed=1
            fi
          done

          if [[ "$failed" -ne 0 ]]; then
            exit 1
          fi

          echo "All CI jobs passed."
