name: CI

on:
  push:
    branches:
      - "main"
      - "master"
      - "chore/**"
      - "feature/**"
      - "fix/**"
  pull_request:
    branches:
      - "main"
      - "master"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "1"
  TESTING: "1"
  DEPTHLENS_SKIP_WARMUP: "1"
  DEPTHLENS_DISABLE_MODEL_DOWNLOADS: "1"
  DEPTHLENS_CACHE_BACKEND: "memory"
  PYTHONUNBUFFERED: "1"

jobs:
  backend-quality:
    name: backend-quality
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Black check
        run: black --check .

      - name: Ruff check
        run: ruff check .

      - name: Mypy
        run: mypy backend/

      - name: Pytest
        run: pytest backend/tests -q

  electron-smoke:
    name: electron-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: electron-app/package-lock.json

      - name: Install Electron dependencies
        working-directory: electron-app
        run: npm ci

      - name: Run Electron lightweight tests
        working-directory: electron-app
        run: npm test

      - name: Verify packaged resource inputs
        working-directory: electron-app
        run: node scripts/verify-resources.js --root-kind repo --mode native --onnx off ..
