name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event_name }}-${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
  cancel-in-progress: true

env:
  CI: "1"
  TESTING: "1"
  DEPTHLENS_DISABLE_MODEL_DOWNLOADS: "1"
  DEPTHLENS_SKIP_WARMUP: "1"
  DEPTHLENS_CACHE_BACKEND: "memory"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

defaults:
  run:
    shell: bash

jobs:
  detect-changes:
    name: detect-changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      docs_only: ${{ steps.detect.outputs.docs_only }}
      docs_changed: ${{ steps.detect.outputs.docs_changed }}
      backend_changed: ${{ steps.detect.outputs.backend_changed }}
      electron_changed: ${{ steps.detect.outputs.electron_changed }}
      docker_changed: ${{ steps.detect.outputs.docker_changed }}
      workflow_changed: ${{ steps.detect.outputs.workflow_changed }}
      python_tooling_changed: ${{ steps.detect.outputs.python_tooling_changed }}
      node_tooling_changed: ${{ steps.detect.outputs.node_tooling_changed }}
      full_ci_required: ${{ steps.detect.outputs.full_ci_required }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect changed files
        id: detect
        timeout-minutes: 2
        run: python scripts/changed_files.py

  backend-quality:
    name: backend-quality
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.backend_changed == 'true' || needs.detect-changes.outputs.python_tooling_changed == 'true' || needs.detect-changes.outputs.workflow_changed == 'true' || needs.detect-changes.outputs.full_ci_required == 'true' }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend dependencies
        timeout-minutes: 12
        run: |
          python -m pip install -r backend/requirements.txt
          python -m pip check
      - name: Run backend quality entrypoint
        timeout-minutes: 30
        run: scripts/ci.sh backend-quality

  electron-contract:
    name: electron-contract
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.electron_changed == 'true' || needs.detect-changes.outputs.node_tooling_changed == 'true' || needs.detect-changes.outputs.workflow_changed == 'true' || needs.detect-changes.outputs.full_ci_required == 'true' }}
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: electron-app/package-lock.json
      - name: Run Electron contract entrypoint
        timeout-minutes: 20
        run: scripts/ci.sh electron-contract

  docker-build:
    name: docker-build
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.docker_changed == 'true' || needs.detect-changes.outputs.workflow_changed == 'true' || needs.detect-changes.outputs.full_ci_required == 'true' }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image with Buildx cache
        uses: docker/build-push-action@v6
        timeout-minutes: 40
        with:
          context: .
          push: false
          load: false
          pull: ${{ github.event_name != 'pull_request' }}
          tags: depthlenspro-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  workflow-policy:
    name: workflow-policy
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.workflow_changed == 'true' || needs.detect-changes.outputs.full_ci_required == 'true' }}
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Validate workflow policy
        timeout-minutes: 2
        run: scripts/ci.sh workflow-policy

  docs-contract:
    name: docs-contract
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.docs_only == 'true' || needs.detect-changes.outputs.docs_changed == 'true' || needs.detect-changes.outputs.workflow_changed == 'true' || needs.detect-changes.outputs.full_ci_required == 'true' }}
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Validate documentation contract
        timeout-minutes: 2
        run: scripts/ci.sh docs-contract

  ci-passed:
    name: ci-passed
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - backend-quality
      - electron-contract
      - docker-build
      - workflow-policy
      - docs-contract
    if: ${{ always() }}
    timeout-minutes: 5
    steps:
      - name: Verify dynamic CI results
        env:
          DETECT_RESULT: ${{ needs.detect-changes.result }}
          BACKEND_RESULT: ${{ needs.backend-quality.result }}
          ELECTRON_RESULT: ${{ needs.electron-contract.result }}
          DOCKER_RESULT: ${{ needs.docker-build.result }}
          WORKFLOW_RESULT: ${{ needs.workflow-policy.result }}
          DOCS_RESULT: ${{ needs.docs-contract.result }}
          BACKEND_REQUIRED: ${{ needs.detect-changes.outputs.backend_changed == 'true' || needs.detect-changes.outputs.python_tooling_changed == 'true' || needs.detect-changes.outputs.workflow_changed == 'true' || needs.detect-changes.outputs.full_ci_required == 'true' }}
          ELECTRON_REQUIRED: ${{ needs.detect-changes.outputs.electron_changed == 'true' || needs.detect-changes.outputs.node_tooling_changed == 'true' || needs.detect-changes.outputs.workflow_changed == 'true' || needs.detect-changes.outputs.full_ci_required == 'true' }}
          DOCKER_REQUIRED: ${{ needs.detect-changes.outputs.docker_changed == 'true' || needs.detect-changes.outputs.workflow_changed == 'true' || needs.detect-changes.outputs.full_ci_required == 'true' }}
          WORKFLOW_REQUIRED: ${{ needs.detect-changes.outputs.workflow_changed == 'true' || needs.detect-changes.outputs.full_ci_required == 'true' }}
          DOCS_REQUIRED: ${{ needs.detect-changes.outputs.docs_only == 'true' || needs.detect-changes.outputs.docs_changed == 'true' || needs.detect-changes.outputs.workflow_changed == 'true' || needs.detect-changes.outputs.full_ci_required == 'true' }}
        run: |
          python - <<'PY'
          import os, sys
          required_jobs = {
              'backend-quality': (os.environ['BACKEND_REQUIRED'] == 'true', os.environ['BACKEND_RESULT']),
              'electron-contract': (os.environ['ELECTRON_REQUIRED'] == 'true', os.environ['ELECTRON_RESULT']),
              'docker-build': (os.environ['DOCKER_REQUIRED'] == 'true', os.environ['DOCKER_RESULT']),
              'workflow-policy': (os.environ['WORKFLOW_REQUIRED'] == 'true', os.environ['WORKFLOW_RESULT']),
              'docs-contract': (os.environ['DOCS_REQUIRED'] == 'true', os.environ['DOCS_RESULT']),
          }
          ok = True
          if os.environ['DETECT_RESULT'] != 'success':
              print(f"::error::detect-changes ended with {os.environ['DETECT_RESULT']}")
              ok = False
          for job, (required, result) in required_jobs.items():
              print(f"{job}: required={required} result={result}")
              if required and result != 'success':
                  print(f"::error::{job} was required but ended with {result}; failed/cancelled/timed_out/skipped required jobs block merge")
                  ok = False
              if not required and result not in {'skipped', 'success'}:
                  print(f"::error::{job} was not required but ended unexpectedly with {result}")
                  ok = False
          if not ok:
              sys.exit(1)
          print('Dynamic CI gate passed.')
          PY