name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.head.repo.full_name || github.repository }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

env:
  CI: "1"
  TESTING: "1"
  DEPTHLENS_DISABLE_MODEL_DOWNLOADS: "1"
  DEPTHLENS_SKIP_WARMUP: "1"
  DEPTHLENS_CACHE_BACKEND: "memory"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

defaults:
  run:
    shell: bash

jobs:
  detect-changes:
    name: detect-changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      docs_changed: ${{ steps.changes.outputs.docs_changed }}
      docs_only: ${{ steps.changes.outputs.docs_only }}
      backend_changed: ${{ steps.changes.outputs.backend_changed }}
      electron_changed: ${{ steps.changes.outputs.electron_changed }}
      workflow_changed: ${{ steps.changes.outputs.workflow_changed }}
      python_tooling_changed: ${{ steps.changes.outputs.python_tooling_changed }}
      node_tooling_changed: ${{ steps.changes.outputs.node_tooling_changed }}
      full_ci_required: ${{ steps.changes.outputs.full_ci_required }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 100
      - name: Detect changed files
        id: changes
        timeout-minutes: 3
        run: python scripts/changed_files.py

  workflow-policy:
    name: workflow-policy
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs['detect-changes'].outputs.workflow_changed == 'true' || needs['detect-changes'].outputs.full_ci_required == 'true'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Validate workflow policy
        timeout-minutes: 3
        run: scripts/ci.sh workflow-policy

  docs-contract:
    name: docs-contract
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs['detect-changes'].outputs.docs_changed == 'true' || needs['detect-changes'].outputs.docs_only == 'true' || needs['detect-changes'].outputs.workflow_changed == 'true' || needs['detect-changes'].outputs.full_ci_required == 'true'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Validate documentation contract
        timeout-minutes: 3
        run: scripts/ci.sh docs-contract

  backend-quality:
    name: backend-quality
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs['detect-changes'].outputs.backend_changed == 'true' || needs['detect-changes'].outputs.python_tooling_changed == 'true' || needs['detect-changes'].outputs.workflow_changed == 'true' || needs['detect-changes'].outputs.full_ci_required == 'true'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements*.txt
      - name: Install backend dependencies
        timeout-minutes: 10
        run: |
          python -m pip install -r backend/requirements-dev.txt
          python -m pip check
      - name: Run backend quality gate
        timeout-minutes: 15
        run: scripts/ci.sh backend-quality

  electron-contract:
    name: electron-contract
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs['detect-changes'].outputs.electron_changed == 'true' || needs['detect-changes'].outputs.node_tooling_changed == 'true' || needs['detect-changes'].outputs.workflow_changed == 'true' || needs['detect-changes'].outputs.full_ci_required == 'true'
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: electron-app/package-lock.json
      - name: Install Electron dependencies
        timeout-minutes: 8
        working-directory: electron-app
        run: npm ci
      - name: Run Electron contract gate
        timeout-minutes: 8
        run: scripts/ci.sh electron-contract

  ci-passed:
    name: ci-passed
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - workflow-policy
      - docs-contract
      - backend-quality
      - electron-contract
    if: always()
    timeout-minutes: 5
    steps:
      - name: Verify required CI jobs passed
        run: |
          set -Eeuo pipefail
          fail=0
          check_job() {
            local job="$1" result="$2" required="$3" reason
            if [[ "$required" == "true" ]]; then
              if [[ "$result" == "success" ]]; then
                reason="required job passed"
              else
                reason="required job did not pass"
                echo "::error title=${job} failed::${job} was required but result was ${result}"
                fail=1
              fi
            else
              if [[ "$result" == "skipped" || "$result" == "success" ]]; then
                reason="not required for changed files"
              else
                reason="optional job unexpectedly ${result}"
                echo "::error title=${job} failed::${job} was not required but result was ${result}"
                fail=1
              fi
            fi
            printf '| %s | %s | %s | %s |\n' "$job" "$result" "$required" "$reason"
          }
          echo '| job | result | required | reason |'
          echo '| --- | --- | --- | --- |'
          detect_required=true
          check_job detect-changes '${{ needs['detect-changes'].result }}' "$detect_required"
          full='${{ needs['detect-changes'].outputs.full_ci_required }}'
          workflow_required=$([[ '${{ needs['detect-changes'].outputs.workflow_changed }}' == 'true' || "$full" == 'true' ]] && echo true || echo false)
          docs_required=$([[ '${{ needs['detect-changes'].outputs.docs_changed }}' == 'true' || '${{ needs['detect-changes'].outputs.docs_only }}' == 'true' || '${{ needs['detect-changes'].outputs.workflow_changed }}' == 'true' || "$full" == 'true' ]] && echo true || echo false)
          backend_required=$([[ '${{ needs['detect-changes'].outputs.backend_changed }}' == 'true' || '${{ needs['detect-changes'].outputs.python_tooling_changed }}' == 'true' || '${{ needs['detect-changes'].outputs.workflow_changed }}' == 'true' || "$full" == 'true' ]] && echo true || echo false)
          electron_required=$([[ '${{ needs['detect-changes'].outputs.electron_changed }}' == 'true' || '${{ needs['detect-changes'].outputs.node_tooling_changed }}' == 'true' || '${{ needs['detect-changes'].outputs.workflow_changed }}' == 'true' || "$full" == 'true' ]] && echo true || echo false)
          check_job workflow-policy '${{ needs['workflow-policy'].result }}' "$workflow_required"
          check_job docs-contract '${{ needs['docs-contract'].result }}' "$docs_required"
          check_job backend-quality '${{ needs['backend-quality'].result }}' "$backend_required"
          check_job electron-contract '${{ needs['electron-contract'].result }}' "$electron_required"
          exit "$fail"
