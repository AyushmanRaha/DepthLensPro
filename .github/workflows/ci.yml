name: CI

on:
  push:
    branches: [refactor-perf-tests, main, master]
  pull_request:
    branches: [refactor-perf-tests, main, master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Black check
        run: black --check .

      - name: Ruff check
        run: ruff check .

      - name: Mypy
        run: mypy backend/

      - name: Pytest
        run: pytest

      - name: Install Electron dependencies
        run: npm ci
        working-directory: electron-app

      - name: Electron lightweight tests
        run: npm test
        working-directory: electron-app

      - name: Resource verification dry run
        run: |
          tmp_root=$(mktemp -d)
          mkdir -p "$tmp_root/backend" "$tmp_root/frontend" "$tmp_root/venv/bin"
          touch "$tmp_root/backend/app.py" "$tmp_root/frontend/index.html" "$tmp_root/venv/bin/python"
          node scripts/verify-resources.js --root-kind repo --mode basic --torch-cache off --detector-cache off --onnx off --json "$tmp_root"
        working-directory: electron-app
