name: Docker image

on:
  push:
    branches:
      - "main"
      - "master"
    tags:
      - "v*"
    paths:
      - "Dockerfile"
      - "docker-compose.yml"
      - "backend/**"
      - ".github/workflows/docker-image.yml"
  pull_request:
    branches:
      - "main"
      - "master"
    paths:
      - "Dockerfile"
      - "docker-compose.yml"
      - "backend/**"
      - ".github/workflows/docker-image.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: depthlenspro-backend

jobs:
  docker-build:
    name: docker-build
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image metadata
        id: meta
        shell: bash
        run: |
          OWNER_LC="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          IMAGE="ghcr.io/${OWNER_LC}/${IMAGE_NAME}"

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
          elif [[ "${GITHUB_REF_NAME}" == "main" || "${GITHUB_REF_NAME}" == "master" ]]; then
            TAG="latest"
          else
            TAG="pr-${{ github.event.pull_request.number || github.run_number }}"
          fi

          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build \
            --pull \
            -t "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}" \
            -t "${{ steps.meta.outputs.image }}:${{ github.sha }}" \
            .

      - name: Smoke inspect image
        run: docker image inspect "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}"

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push Docker image
        if: github.event_name != 'pull_request'
        run: |
          docker push "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}"
          docker push "${{ steps.meta.outputs.image }}:${{ github.sha }}"
