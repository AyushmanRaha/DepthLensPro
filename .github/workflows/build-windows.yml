name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-windows.yml"
      - "package.json"
      - "electron-app/**"
      - "backend/**"
      - "frontend/**"
      - "scripts/**"
      - "models/**"

jobs:
  build-windows-x64:
    name: Build Windows x64 installer
    runs-on: windows-latest
    timeout-minutes: 120

    env:
      DEPTHLENS_SKIP_WARMUP: "1"
      DEPTHLENS_CACHE_BACKEND: "memory"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: electron-app/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          architecture: "x64"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Show tool versions
        shell: pwsh
        run: |
          node --version
          npm --version
          python --version
          py --version

      - name: Install dependencies and cache required model assets
        shell: pwsh
        run: |
          npm run setup:win -- --without-onnx

      - name: Build Windows x64 EXE
        shell: pwsh
        run: |
          npm run build:win:x64

      - name: List build output
        shell: pwsh
        run: |
          Get-ChildItem -Path electron-app/dist -Recurse | Select-Object FullName, Length

      - name: Upload Windows installer
        uses: actions/upload-artifact@v7
        with:
          name: DepthLens-Pro-Windows-x64-Installer
          path: electron-app/dist/*.exe
          if-no-files-found: error
          retention-days: 7
          compression-level: 0
