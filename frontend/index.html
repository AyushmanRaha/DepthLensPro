<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DepthLens Pro Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo">DepthLens Pro</div>
            <p class="tagline">Advanced Monocular Depth Estimation</p>
        </div>
    </header>

    <div class="dashboard-container">
        <aside class="control-panel">
            <div class="card">
                <h3>System Configuration</h3>
                <label for="modelSelect">Select AI Architecture</label>
                <select id="modelSelect">
                    <option value="MiDaS_small">MiDaS Small (Speed-Optimized)</option>
                    <option value="DPT_Hybrid">DPT Hybrid (Balanced)</option>
                    <option value="DPT_Large">DPT Large (Accuracy-Optimized)</option>
                </select>
            </div>

            <div class="card upload-area" id="dropZone">
                <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <circle cx="8.5" cy="8.5" r="1.5"></circle>
                    <polyline points="21 15 16 10 5 21"></polyline>
                </svg>
                
                <h3>Image Upload Queue</h3>
                <p class="guidance">Max: 5 Files | PNG/JPG | Max Res: 4K</p>
                <input type="file" id="fileInput" accept="image/jpeg, image/png" multiple hidden>
                <button class="btn btn-browse" onclick="document.getElementById('fileInput').click()">Browse Files</button>
                <p class="drop-text">or drag & drop images here</p>
                <div id="fileQueue" class="file-queue"></div>
            </div>

            <div class="action-buttons">
                <button id="processBtn" class="btn btn-primary" disabled>Generate</button>
                <button id="stopBtn" class="btn btn-danger hidden">Stop</button>
                <button id="refreshBtn" class="btn btn-secondary">Refresh</button>
            </div>
        </aside>

        <main class="results-visualizer">
            <div id="loadingState" class="processing-feedback hidden">
                <p id="processingText">Initializing model inference...</p>
                <p id="progressTimer" class="timer-text">Estimated time: --s</p>
                <div class="progress-bar-container">
                    <div id="progressBar" class="progress-bar"></div>
                </div>
            </div>

            <section class="results-gallery" id="resultsGallery"></section>

            <section class="performance-metrics">
                <h3>Performance Analytics</h3>
                <div class="metrics-grid">
                    <div class="metric-card">
                        <h4>Total Inference Time</h4>
                        <h2 id="metricTime">--</h2>
                    </div>
                    <div class="metric-card">
                        <h4>Images Processed</h4>
                        <h2 id="metricRes">--</h2>
                    </div>
                    <div class="metric-card chart-container">
                        <canvas id="performanceChart"></canvas>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
