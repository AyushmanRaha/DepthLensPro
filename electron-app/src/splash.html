<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: transparent;
      font-family: 'Rajdhani', -apple-system, sans-serif;
      color: #dff0ff;
      overflow: hidden;
      -webkit-app-region: drag;  /* make splash draggable */
    }
    .splash {
      width: 100%; height: 100%;
      background: linear-gradient(160deg, #0c1521 0%, #070d17 100%);
      border: 1px solid rgba(0,200,255,.25);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      box-shadow: 0 32px 96px rgba(0,0,0,.8);
    }
    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: .05em;
    }
    h1 em { color: #00c8ff; font-style: normal; }
    .sub { font-size: .75rem; color: #8eb7d6; letter-spacing: .15em; text-transform: uppercase; }
    .loader {
      width: 200px; height: 3px;
      background: rgba(255,255,255,.08);
      border-radius: 2px; overflow: hidden;
    }
    .loader-fill {
      height: 100%;
      background: linear-gradient(90deg, #00c8ff, #7b5cf8);
      border-radius: 2px;
      animation: load 2.4s cubic-bezier(.4,0,.2,1) infinite;
    }
    @keyframes load {
      0%   { width: 0%;   margin-left: 0%; }
      50%  { width: 75%;  margin-left: 10%; }
      100% { width: 0%;   margin-left: 100%; }
    }
    .status { font-size: .68rem; color: #3a5a72; letter-spacing: .08em; }
  </style>
</head>
<body>
  <div class="splash">
    <h1>DepthLens<em>Pro</em></h1>
    <p class="sub">Loading Depth Engine…</p>
    <div class="loader"><div class="loader-fill"></div></div>
    <p class="status">Starting MiDaS inference server</p>
  </div>
</body>
</html>
