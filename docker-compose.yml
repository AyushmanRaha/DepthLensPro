services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: depthlenspro-backend:latest
    env_file:
      - path: .env
        required: true
    environment:
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-8000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DEBUG: ${DEBUG:-false}
    ports:
      - "8000:8000"
    restart: unless-stopped
    init: true
    cpus: "2.0"
    mem_limit: 4g
    pids_limit: 512
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          memory: 512M
