[tool.black]
line-length = 100
target-version = ["py312"]

# Black is the formatter; run Ruff as a linter only to avoid competing formatters.
[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"backend/scripts/export_onnx.py" = ["E402"]

[tool.pytest.ini_options]
pythonpath = [
  "."
]
